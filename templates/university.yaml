name: University Thesis Template
version: "1.0"
regions:
  - region: Normal
    paragraph_style:
      font_family: 宋体
      font_size_pt: 12
      alignment: JUSTIFY
      line_spacing: 1.5
      first_line_indent_chars: 2
  - region: Heading 1
    paragraph_style:
      font_family: 黑体
      font_size_pt: 16
      bold: true
      alignment: LEFT
  - region: Normal Table
    table_style:
      top_border:
        style: single
        size: 8
      bottom_border:
        style: single
        size: 8
      inside_h_border:
        style: single
        size: 4
      inside_v_border:
        style: single
        size: 4
